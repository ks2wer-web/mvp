{% extends 'base.html' %}{% block content %}<div class="page-title"><h1>Meine Fahrt</h1><form><input type="date" name="date" value="{{ d }}"><button>OK</button></form></div>{% for r, students in groups %}<section class="panel"><h2>{{ r.name }}</h2>{% for s in students %}<div class="driver-student"><b>{{ s.first_name }} {{ s.last_name }}</b><div class="statusline">Hin: {{ s.hin or 'offen' }} · Rück: {{ s.rueck or 'offen' }}</div><form method="post" action="{{ url_for('driver_check') }}"><input type="hidden" name="log_date" value="{{ d }}"><input type="hidden" name="student_id" value="{{ s.id }}"><select name="direction"><option value="Hinfahrt">Hinfahrt</option><option value="Rueckfahrt">Rueckfahrt</option></select><input name="note" placeholder="Notiz"><div class="btnrow"><button name="status" value="Mitgefahren" class="okbtn">Mitgefahren</button><button name="status" value="Fehlt" class="warnbtn">Fehlt</button><button name="status" value="Abgesagt" class="badbtn">Abgesagt</button></div></form></div>{% endfor %}</section>{% endfor %}{% endblock %}
